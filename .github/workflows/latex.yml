name: Build LaTeX to PDF

on:
  push:
    branches: [main, deploy/render-v2]
    paths:
      - "thesis/Bachelorarbeit_*.tex"
      - "docs_short/**"
      - ".github/workflows/latex.yml"
  pull_request:
    branches: [main, deploy/render-v2]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-texlive-${{ hashFiles('.github/workflows/latex.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-texlive-

      - name: Install LaTeX (cached)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-german \
            texlive-pictures \
            fonts-lmodern

      - name: Build LaTeX to PDF (with TikZ diagrams)
        run: |
          cd ${{ github.workspace }}/thesis
          xelatex -interaction=nonstopmode -shell-escape Bachelorarbeit_Main_Simple.tex
          echo "✅ First pass complete"
          # Only re-run if needed for references
          xelatex -interaction=nonstopmode -shell-escape Bachelorarbeit_Main_Simple.tex || true

      - name: Check PDF was created
        run: |
          if [ -f "thesis/Bachelorarbeit_Main_Simple.pdf" ]; then
            echo "✅ PDF erfolgreich generiert!"
            ls -lh thesis/Bachelorarbeit_Main_Simple.pdf
            exit 0
          else
            echo "❌ PDF Generierung fehlgeschlagen"
            exit 1
          fi

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Bachelorarbeit_PDF
          path: thesis/Bachelorarbeit_Main_Simple.pdf
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Bachelorarbeit_Main_Simple.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────
  - type: web
    name: liveticker-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    preDeployCommand: "alembic upgrade head"
    envVars:
      - key: DATABASE_URL
        sync: false           # → Supabase Connection String eintragen
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false           # → ["https://liveticker-frontend.onrender.com"]
      - key: PUBLIC_BASE_URL
        sync: false           # → https://liveticker-backend.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: N8N_WEBHOOK_LINEUP
        sync: false           # → https://[deine-n8n].app.n8n.cloud/webhook/lineups
      - key: N8N_WEBHOOK_EVENTS
        sync: false
      - key: N8N_WEBHOOK_STATISTICS
        sync: false
      - key: N8N_WEBHOOK_PLAYER_STATISTICS
        sync: false
      - key: N8N_WEBHOOK_PREMATCH
        sync: false
      - key: N8N_WEBHOOK_COMPETITIONS
        sync: false
      - key: N8N_WEBHOOK_MATCHES
        sync: false
      - key: N8N_WEBHOOK_COUNTRY
        sync: false

  # ── Frontend (React Static Site) ─────────────────────────────────
  - type: web
    name: liveticker-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE
        sync: false           # → https://liveticker-backend.onrender.com/api/v1
      - key: REACT_APP_N8N_BASE
        value: https://liveticker-n8n.onrender.com/webhook

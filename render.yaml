services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────
  - type: web
    name: liveticker-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false           # → Supabase Connection String eintragen
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false           # → ["https://liveticker-frontend.onrender.com"]
      - key: PUBLIC_BASE_URL
        sync: false           # → https://liveticker-backend.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: N8N_WEBHOOK_LINEUP
        value: https://liveticker-n8n.onrender.com/webhook/lineups
      - key: N8N_WEBHOOK_EVENTS
        value: https://liveticker-n8n.onrender.com/webhook/Events
      - key: N8N_WEBHOOK_STATISTICS
        value: https://liveticker-n8n.onrender.com/webhook/statistics
      - key: N8N_WEBHOOK_PLAYER_STATISTICS
        value: https://liveticker-n8n.onrender.com/webhook/Player-Statistics
      - key: N8N_WEBHOOK_PREMATCH
        value: https://liveticker-n8n.onrender.com/webhook/import-prematch
      - key: N8N_WEBHOOK_COMPETITIONS
        value: https://liveticker-n8n.onrender.com/webhook/import-team-competitions
      - key: N8N_WEBHOOK_MATCHES
        value: https://liveticker-n8n.onrender.com/webhook/import-matches
      - key: N8N_WEBHOOK_COUNTRY
        value: https://liveticker-n8n.onrender.com/webhook/import-country

  # ── n8n (Workflow Automation) ─────────────────────────────────────
  - type: web
    name: liveticker-n8n
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest
    plan: free
    envVars:
      - key: N8N_HOST
        value: liveticker-n8n.onrender.com
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://liveticker-n8n.onrender.com
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false           # → Benutzername setzen
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false           # → Passwort setzen
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        sync: false           # → Render PostgreSQL DB-Name
      - key: DB_POSTGRESDB_HOST
        sync: false           # → Render PostgreSQL Host
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_USER
        sync: false           # → Render PostgreSQL User
      - key: DB_POSTGRESDB_PASSWORD
        sync: false           # → Render PostgreSQL Password

  # ── Frontend (React Static Site) ─────────────────────────────────
  - type: web
    name: liveticker-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/build
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE
        sync: false           # → https://liveticker-backend.onrender.com/api/v1
      - key: REACT_APP_N8N_BASE
        value: https://liveticker-n8n.onrender.com/webhook
